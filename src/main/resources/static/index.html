<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>登录</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function 登录表单() {
  const [用户名, 设置用户名] = React.useState('');
  const [密码, 设置密码] = React.useState('');
  const [消息, 设置消息] = React.useState('');

  const 处理提交 = async e => {
    e.preventDefault();
    const res = await fetch('/api/登录', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 用户名, 密码 })
    });
    const data = await res.json();
    if (data.状态 === '成功') {
      设置消息('登录成功');
    } else {
      设置消息(data.消息 || '登录失败');
    }
  };

  return (
    <div>
      <h2>登录</h2>
      <form onSubmit={处理提交}>
        <div>
          <input placeholder="用户名" value={用户名} onChange={e => 设置用户名(e.target.value)} />
        </div>
        <div>
          <input type="password" placeholder="密码" value={密码} onChange={e => 设置密码(e.target.value)} />
        </div>
        <button type="submit">登录</button>
      </form>
      {消息 && <p>{消息}</p>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<登录表单 />);
</script>
</body>
</html>
